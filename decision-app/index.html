<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life Logic - Decision Engine</title>
    <link rel="stylesheet" href="./css/style.css" />
    <!-- Font Awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <!-- Header  -->

      <header>
        <div class="logo">
             <span class="logo-icon"><img src="./LOGO.png" height="100" width="100" alt=""></span>
        <h1>Life Logic</h1>
        </div>
        <button onclick="toggleHistory()" class="history-btn">
            <i class="fas fa-history"></i> History
        </button>
       </header>

       <!-- Main Screen -->
        <div id="main-screen">
            <div class="hero">
                <h2>Need help deciding?</h2>
                <p>Answer a few question and get a smart recommendation.</p>
                <button onclick="startDecision()" class="start-btn">Start New Decision</button>
            </div>
        </div>

        <!-- Question Screen  -->
         <div id="questions-screen" class="hidden">
            <div class="card">
                <h3><i class="fas fa-question-circle"></i> Answer these Questions</h3>
                <div id="question-container"></div>
                <button onclick="analyzeDecision()" class="analyze-btn">ANALYZE DECISION</button>
            </div>
         </div>

            <!-- Result Screen  -->
             <div id="result-screen" class="hidden">
                <div class="result-card">
                    <div id="decision-emoji" class="emoji"></div>
                    <h2 id="main-decision"></h2>
                    <div class="confidence">Confidence: <span id="confidence"></span>%</div>

                    <div class="result-section">
                        <h4>why this decision?</h4>
                        <p id="explanation"></p>
                    </div>

                    <div class="result-section">
                        <h4>Advice</h4>
                        <p id="advice"></p>
                    
                    </div>
                    <div id="warning" class="warning"></div>
                    <div class="result-actions">
                        <button onclick="saveCurrentDecision()" class="save-btn">Save to history</button>
                        <button onclick="newDecision()" class="new-btn">New Decision</button>
                    </div>
                </div>
             </div>

                <!-- History panel  -->
                 <div id="history-panel" class="hiden">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                      <h3>Decision History</h3>
                    <button onclick="exportHistory()" class="export-btn">
                        <i class="fas fa-download"></i> Export as text
                    </button>
                    </div>
                    <div id="history-list"></div>
                 </div>
       </div>
    </div>
    <script src="./js/script.js"></script>  
  </body>
</html>
